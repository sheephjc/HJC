<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HJC 的个人主页</title>

    <link rel="icon" href="WS_trans.png" type="image/png">

    <style>
        /* --- 动画定义 --- */
        
        /* 全局背景纯透明度淡入 */
        @keyframes simpleFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* 卡片从下方淡入并滑入 */
        @keyframes slideUpFade {
            from { 
                opacity: 0; 
                transform: translateY(30px); 
            }
            to { 
                opacity: 1; 
                transform: translateY(0); 
            }
        }

        /* --- 基础样式 --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            overflow: hidden; /* 防止动画时出现临时滚动条 */
        }

        body {
            /* 背景图设置 */
            background-image: url('红鸾樱落.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            background-color: #2c3e50; /* 加载前的底色 */
            
            display: flex;
            align-items: center;
            justify-content: flex-start; /* 卡片靠左 */
            padding-left: 10%;
            
            /* 应用平滑淡入动画 */
            animation: simpleFadeIn 1.2s ease-in-out forwards;
        }

        /* --- 高清晰度毛玻璃卡片 --- */
        .glass-card {
            background: rgba(255, 255, 255, 0.06); 
            backdrop-filter: blur(8px); /* 初始就带有模糊，不参与动画，防止闪烁 */
            -webkit-backdrop-filter: blur(8px);
            
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            padding: 40px;
            width: 340px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            color: white;

            /* 卡片延迟 0.3s 出现，增加视觉节奏感 */
            opacity: 0;
            animation: slideUpFade 0.8s ease-out 0.3s forwards;
        }

        /* --- 头像效果 --- */
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.4);
            margin-bottom: 20px;
            object-fit: cover;
            /* 弹性交互效果 */
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), 
                        border-color 0.4s, 
                        box-shadow 0.4s;
            cursor: pointer;
        }

        .avatar:hover {
            transform: scale(1.15) rotate(5deg);
            border-color: rgba(255, 255, 255, 0.9);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 30px;
            letter-spacing: 2px;
            font-weight: 500;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.2);
        }

        /* --- 按钮与导航 --- */
        .nav-links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            padding: 12px;
            text-decoration: none;
            color: white;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            transition: all 0.3s ease;
            font-size: 1rem;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateX(5px); /* 向右微滑 */
            border-color: rgba(255, 255, 255, 0.5);
        }

        footer {
            margin-top: 30px;
            font-size: 0.7rem;
            opacity: 0.6;
        }

        /* --- 弹窗样式 --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            position: relative;
            width: 300px !important;
            padding: 30px !important;
            transform: scale(0.8);
            transition: all 0.3s ease;
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 24px;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.7);
        }

        .tools-list {
            margin-top: 20px;
            display: grid;
            gap: 10px;
        }

        .tool-item {
            display: flex;
            align-items: center;
            padding: 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            text-decoration: none;
            color: white;
            transition: background 0.2s;
        }

        .tool-item:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .tool-icon { margin-right: 15px; font-size: 1.2rem; }
        .disabled { opacity: 0.5; cursor: not-allowed; }
        h2 { font-size: 1.4rem; margin-bottom: 10px; font-weight: 500; }

        /* 移动端适配 */
        @media (max-width: 768px) {
            body {
                justify-content: center;
                padding-left: 0;
                animation: none;
            }

            .glass-card {
                width: 85%;
                opacity: 1;
                animation: none;
            }

            .modal-overlay,
            .modal-content {
                transition: none;
            }

            .modal-content {
                transform: none;
            }
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <img src="Woodstock.png" alt="HJC" class="avatar">
        <h1>HJC</h1>
        <div class="nav-links">
            <a href="小鳄龙/index.html" class="btn">🐊 小鳄龙之家</a>
            <a href="javascript:void(0)" class="btn" onclick="openTools()">🛠️ 我的工具库</a>
        </div>
        <footer>© 2026 HJC'S SPACE</footer>
    </div>

    <div id="toolsModal" class="modal-overlay" onclick="closeTools(event)">
        <div class="modal-content glass-card" onclick="event.stopPropagation()">
            <span class="close-btn" onclick="closeTools(event)">&times;</span>
            <h2>工具箱</h2>
            <div class="tools-list">
                <a href="tools/MS.html" class="tool-item" target="_blank" rel="noopener noreferrer">
                    <span class="tool-icon">🧪</span>
                    <span class="tool-name">高分辨质谱计算器</span
                </a>                                        
                 <a href="tools/漳麻test2.html" class="tool-item" target="_blank" rel="noopener noreferrer">
                    <span class="tool-icon">🀄</span>
                    <span class="tool-name">漳州麻将</span>
                </a>
                <div class="tool-item disabled">
                    <span class="tool-icon">⏳</span>
                    <span class="tool-name">更多工具开发中...</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        function openTools() {
            document.getElementById('toolsModal').classList.add('active');
        }
        function closeTools(e) {
            document.getElementById('toolsModal').classList.remove('active');
        }
    </script>
</body>
</html>
